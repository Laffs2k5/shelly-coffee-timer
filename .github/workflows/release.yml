name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up debug keystore
        env:
          DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}
        run: |
          mkdir -p ~/.android
          echo "$DEBUG_KEYSTORE" | base64 -d > ~/.android/debug.keystore

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        working-directory: app
        run: gradle wrapper

      - name: Build debug APK
        working-directory: app
        run: ./gradlew assembleDebug --no-daemon

      - name: Generate changelog
        id: notes
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          {
            echo "body<<RELEASE_NOTES_EOF"
            if [ -z "$PREVIOUS_TAG" ]; then
              echo "Initial release."
            else
              echo "## What's changed since ${PREVIOUS_TAG}"
              echo ""
              # Group commits by type
              for type_label in "feat:Features" "fix:Bug Fixes" "docs:Documentation" "ci:CI/CD" "refactor:Refactoring" "chore:Maintenance"; do
                prefix="${type_label%%:*}"
                label="${type_label##*:}"
                COMMITS=$(git log --pretty=format:"- %s" "${PREVIOUS_TAG}..${{ github.ref_name }}" | grep "^- ${prefix}:" | sed "s/^- ${prefix}: /- /" || true)
                if [ -n "$COMMITS" ]; then
                  echo "### ${label}"
                  echo "$COMMITS"
                  echo ""
                fi
              done
              # Uncategorized commits
              OTHER=$(git log --pretty=format:"- %s" "${PREVIOUS_TAG}..${{ github.ref_name }}" | grep -v "^- feat:\|^- fix:\|^- docs:\|^- ci:\|^- refactor:\|^- chore:" || true)
              if [ -n "$OTHER" ]; then
                echo "### Other"
                echo "$OTHER"
                echo ""
              fi
              echo "**Full diff:** [\`${PREVIOUS_TAG}...${{ github.ref_name }}\`](https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${{ github.ref_name }})"
            fi
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/*.apk
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: false
