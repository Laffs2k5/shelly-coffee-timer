<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shelly Coffee Timer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #1a1a1a;
  color: #e0e0e0;
  padding: 16px;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* --- Cards --- */
.card {
  background: #2a2a2a;
  border: 1px solid #444444;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}

/* --- Section headings --- */
.card-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #90CAF9;
  margin-bottom: 12px;
  font-weight: 600;
}

/* --- Status display --- */
.status-line {
  font-size: 28px;
  font-weight: 700;
  padding: 8px 0 4px;
  transition: color 0.4s ease, font-size 0.3s ease;
}
.status-on {
  color: #4CAF50;
  font-size: 32px;
}
.status-off {
  color: #888888;
  font-size: 24px;
}
.status-error {
  color: #f44336;
  font-size: 22px;
}
.mode-tag {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: rgba(144, 202, 249, 0.15);
  color: #90CAF9;
  padding: 3px 10px;
  border-radius: 12px;
  margin-left: 8px;
  vertical-align: middle;
}
.ack-line {
  font-size: 13px;
  color: #888888;
  padding: 2px 0 8px;
  min-height: 22px;
}

/* --- Buttons --- */
.btn-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.btn {
  padding: 16px 0;
  font-size: 16px;
  font-weight: 700;
  border: 1px solid #444444;
  border-radius: 10px;
  background: #333333;
  color: #e0e0e0;
  cursor: pointer;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  min-height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn:hover {
  background: #3a3a3a;
}
.btn:active {
  background: #444444;
  transform: scale(0.96);
}
.btn-off {
  border-color: #888888;
  color: #888888;
}
.btn-off:hover {
  border-color: #999999;
  background: rgba(136, 136, 136, 0.15);
}
.btn-on {
  border-color: #4CAF50;
  color: #4CAF50;
}
.btn-on:hover {
  background: rgba(76, 175, 80, 0.12);
}
.btn-on:active {
  background: rgba(76, 175, 80, 0.25);
}

/* --- Schedule section --- */
.schedule-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
}
.schedule-row label {
  font-size: 15px;
  color: #e0e0e0;
}
.toggle {
  position: relative;
  width: 50px;
  height: 28px;
  cursor: pointer;
  flex-shrink: 0;
}
.toggle input { display: none; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: #555555;
  border-radius: 14px;
  transition: background 0.25s ease;
}
.toggle-slider::after {
  content: "";
  position: absolute;
  width: 22px;
  height: 22px;
  left: 3px;
  top: 3px;
  background: #ccc;
  border-radius: 50%;
  transition: transform 0.25s ease, background 0.25s ease;
}
.toggle input:checked + .toggle-slider { background: #4CAF50; }
.toggle input:checked + .toggle-slider::after {
  transform: translateX(22px);
  background: #ffffff;
}

.schedule-divider {
  border: none;
  border-top: 1px solid #3a3a3a;
  margin: 4px 0;
}

.time-picker {
  display: flex;
  align-items: center;
  gap: 6px;
}
.time-input {
  width: 52px;
  padding: 8px 4px;
  font-size: 18px;
  font-weight: 600;
  text-align: center;
  background: #1a1a1a;
  color: #e0e0e0;
  border: 1px solid #444444;
  border-radius: 8px;
  transition: border-color 0.2s ease;
  -moz-appearance: textfield;
}
.time-input::-webkit-outer-spin-button,
.time-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.time-input:focus {
  outline: none;
  border-color: #90CAF9;
}
.time-sep {
  font-size: 20px;
  font-weight: bold;
  color: #888888;
}
.time-btn {
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: rgba(144, 202, 249, 0.12);
  color: #90CAF9;
  border: 1px solid rgba(144, 202, 249, 0.3);
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s ease;
}
.time-btn:hover {
  background: rgba(144, 202, 249, 0.2);
}
.time-btn:active {
  background: rgba(144, 202, 249, 0.3);
}

/* --- Connection footer --- */
.conn-footer {
  margin-top: auto;
  padding-top: 16px;
}
.conn-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  font-size: 12px;
  color: #666666;
}
.conn-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 6px;
  transition: background 0.4s ease;
}
.conn-ok { background: #FFC107; }
.conn-err { background: #f44336; }
.last-update {
  font-size: 11px;
  color: #555555;
}

/* --- Settings button --- */
.settings-btn {
  position: fixed;
  top: 12px;
  right: 12px;
  background: #2a2a2a;
  border: 1px solid #444444;
  color: #888888;
  font-size: 18px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s ease, color 0.15s ease;
  z-index: 50;
}
.settings-btn:hover {
  background: #333333;
  color: #e0e0e0;
}
.settings-btn:active {
  background: #444444;
}

/* --- Modal overlay --- */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 100;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: opacity 0.2s ease;
}
.modal-overlay.open {
  display: flex;
  opacity: 1;
}
.modal {
  background: #2a2a2a;
  border: 1px solid #444444;
  border-radius: 16px;
  padding: 24px;
  width: 90%;
  max-width: 360px;
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
  transform: translateY(10px);
  transition: transform 0.2s ease;
}
.modal-overlay.open .modal {
  transform: translateY(0);
}
.modal h3 {
  margin-bottom: 16px;
  font-size: 17px;
  font-weight: 700;
  color: #e0e0e0;
}
.modal label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #888888;
  margin: 12px 0 6px;
}
.modal input[type="text"],
.modal input[type="password"] {
  width: 100%;
  padding: 10px 12px;
  font-size: 14px;
  background: #1a1a1a;
  color: #e0e0e0;
  border: 1px solid #444444;
  border-radius: 8px;
  transition: border-color 0.2s ease;
}
.modal input[type="text"]:focus,
.modal input[type="password"]:focus {
  outline: none;
  border-color: #90CAF9;
}
.modal-btns {
  display: flex;
  gap: 8px;
  margin-top: 20px;
  justify-content: flex-end;
}
.modal-btns button {
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  border: 1px solid #444444;
  border-radius: 8px;
  cursor: pointer;
  background: #333333;
  color: #e0e0e0;
  transition: background 0.15s ease;
}
.modal-btns button:hover {
  background: #3a3a3a;
}
.modal-btns button.primary {
  background: #4CAF50;
  color: #ffffff;
  border-color: #4CAF50;
}
.modal-btns button.primary:hover {
  background: #43a047;
}
.modal-btns button:active {
  opacity: 0.8;
}
</style>
</head>
<body>

<button class="settings-btn" onclick="openSettings()">&#9881;</button>

<div class="card">
  <div class="card-title">Manual control</div>
  <div id="status" class="status-line status-off">--</div>
  <div id="ack" class="ack-line"></div>
  <div class="btn-row">
    <button class="btn btn-off" onclick="sendCmd('off')">OFF</button>
    <button class="btn" onclick="sendCmd('sub')">&minus;30</button>
    <button class="btn" onclick="sendCmd('ext')">+30</button>
    <button class="btn btn-on" onclick="sendCmd('t90')">90</button>
  </div>
</div>

<div class="card">
  <div class="card-title">Schedule</div>
  <div class="schedule-row">
    <label>Schedule enabled</label>
    <label class="toggle">
      <input type="checkbox" id="schToggle" onchange="saveSchedule()">
      <span class="toggle-slider"></span>
    </label>
  </div>
  <hr class="schedule-divider">
  <div class="schedule-row">
    <label>Wake-up time</label>
    <div class="time-picker">
      <input type="number" id="schH" class="time-input" min="0" max="23" value="6">
      <span class="time-sep">:</span>
      <input type="number" id="schM" class="time-input" min="0" max="59" value="0" step="5">
      <button class="time-btn" onclick="saveSchedule()">Set</button>
    </div>
  </div>
</div>

<div class="conn-footer">
  <div class="conn-bar">
    <span><span id="connDot" class="conn-dot conn-err"></span><span id="connText">Not connected</span></span>
    <span id="lastUpdate" class="last-update"></span>
  </div>
</div>

<!-- Settings modal -->
<div id="settingsModal" class="modal-overlay">
  <div class="modal">
    <h3>Adafruit IO Credentials</h3>
    <label for="inputUser">Username</label>
    <input type="text" id="inputUser" autocapitalize="none" autocorrect="off">
    <label for="inputKey">AIO Key</label>
    <input type="password" id="inputKey">
    <div class="modal-btns">
      <button onclick="closeSettings()">Cancel</button>
      <button class="primary" onclick="saveCreds()">Save</button>
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";

  // --- Credential management ---
  let aioUser = localStorage.getItem("aio_user") || "";
  let aioKey  = localStorage.getItem("aio_key")  || "";
  let pollTimer = null;
  let currentConfig = null; // cached config for read-modify-write

  function hasCreds() { return aioUser && aioKey; }

  window.openSettings = function() {
    document.getElementById("inputUser").value = aioUser;
    document.getElementById("inputKey").value = aioKey;
    document.getElementById("settingsModal").classList.add("open");
  };

  window.closeSettings = function() {
    document.getElementById("settingsModal").classList.remove("open");
  };

  // Close modal on overlay click
  document.getElementById("settingsModal").addEventListener("click", function(e) {
    if (e.target === this) closeSettings();
  });

  window.saveCreds = function() {
    const u = document.getElementById("inputUser").value.trim();
    const k = document.getElementById("inputKey").value.trim();
    if (!u || !k) { alert("Both fields are required."); return; }
    aioUser = u;
    aioKey = k;
    localStorage.setItem("aio_user", u);
    localStorage.setItem("aio_key", k);
    closeSettings();
    refreshStatus();
    loadConfig();
  };

  // Prompt on first load if no creds
  if (!hasCreds()) {
    setTimeout(function() { openSettings(); }, 200);
  }

  // --- API helpers ---
  function apiUrl(feed, path) {
    return "https://io.adafruit.com/api/v2/" + encodeURIComponent(aioUser) + "/feeds/" + feed + "/" + path;
  }

  function apiHeaders() {
    return { "X-AIO-Key": aioKey, "Content-Type": "application/json" };
  }

  async function apiGet(feed, path) {
    const resp = await fetch(apiUrl(feed, path), { headers: apiHeaders() });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    return resp.json();
  }

  async function apiPost(feed, path, body) {
    const resp = await fetch(apiUrl(feed, path), {
      method: "POST",
      headers: apiHeaders(),
      body: JSON.stringify(body)
    });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    return resp.json();
  }

  // --- Status display ---
  function setStatus(text, cls) {
    const el = document.getElementById("status");
    el.textContent = text;
    el.className = "status-line " + cls;
  }

  function setAck(text) {
    document.getElementById("ack").textContent = text;
  }

  function setConn(ok, text) {
    document.getElementById("connDot").className = "conn-dot " + (ok ? "conn-ok" : "conn-err");
    document.getElementById("connText").textContent = text;
    if (ok) {
      document.getElementById("lastUpdate").textContent =
        "Updated " + new Date().toLocaleTimeString([], {hour12: false});
    }
  }

  async function refreshStatus() {
    if (!hasCreds()) return;
    try {
      const data = await apiGet("heartbeat", "data/last");
      const val = JSON.parse(data.value);

      if (val.s === "on") {
        setStatus("ON with " + val.r + " min to go", "status-on");
      } else {
        setStatus("OFF", "status-off");
      }

      // Mode tag
      let modeText = "";
      if (val.mode === "sch") modeText = "scheduled";
      else if (val.mode === "man") modeText = "manual";
      if (modeText) {
        document.getElementById("status").innerHTML +=
          ' <span class="mode-tag">' + modeText + '</span>';
      }

      // Ack
      if (val.ack) {
        const ackMap = { ext: "+30", sub: "-30", off: "off", t90: "90", sch: "schedule" };
        setAck("Last command: " + (ackMap[val.ack] || val.ack));
      } else {
        setAck("");
      }

      // Schedule info from heartbeat
      if (typeof val.sch !== "undefined") {
        document.getElementById("schToggle").checked = val.sch === 1;
      }
      if (typeof val.h !== "undefined") {
        document.getElementById("schH").value = String(val.h).padStart(2, "0");
      }
      if (typeof val.m !== "undefined") {
        document.getElementById("schM").value = String(val.m).padStart(2, "0");
      }

      setConn(true, "Remote (Adafruit IO)");
    } catch (e) {
      setStatus("Unknown -- cannot reach Adafruit IO", "status-error");
      setAck("");
      setConn(false, "Offline: " + e.message);
    }
  }

  // --- Commands ---
  window.sendCmd = async function(cmd) {
    if (!hasCreds()) { openSettings(); return; }
    try {
      const ts = Math.floor(Date.now() / 1000);
      const payload = JSON.stringify({ c: cmd, ts: ts });
      await apiPost("command", "data", { value: payload });
      // Brief delay then refresh to let device process
      setTimeout(refreshStatus, 1500);
    } catch (e) {
      alert("Command failed: " + e.message);
    }
  };

  // --- Config / Schedule ---
  async function loadConfig() {
    if (!hasCreds()) return;
    try {
      const data = await apiGet("config", "data/last");
      currentConfig = JSON.parse(data.value);
      // Update UI from config (more authoritative than heartbeat for schedule)
      if (typeof currentConfig.sch !== "undefined") {
        document.getElementById("schToggle").checked = currentConfig.sch === 1;
      }
      if (typeof currentConfig.h !== "undefined") {
        document.getElementById("schH").value = String(currentConfig.h).padStart(2, "0");
      }
      if (typeof currentConfig.m !== "undefined") {
        document.getElementById("schM").value = String(currentConfig.m).padStart(2, "0");
      }
    } catch (e) {
      // Config feed might not exist yet; ignore
      console.warn("Config load failed:", e);
    }
  }

  window.saveSchedule = async function() {
    if (!hasCreds()) { openSettings(); return; }
    try {
      // Read current config first (read-modify-write)
      const data = await apiGet("config", "data/last");
      currentConfig = JSON.parse(data.value);

      const newCfg = {
        v:   (currentConfig.v || 0) + 1,
        sch: document.getElementById("schToggle").checked ? 1 : 0,
        h:   parseInt(document.getElementById("schH").value, 10) || 0,
        m:   parseInt(document.getElementById("schM").value, 10) || 0,
        dur: currentConfig.dur || 90,
        max: currentConfig.max || 180
      };

      await apiPost("config", "data", { value: JSON.stringify(newCfg) });
      currentConfig = newCfg;

      // Refresh to show updated state
      setTimeout(refreshStatus, 1500);
    } catch (e) {
      alert("Schedule update failed: " + e.message);
    }
  };

  // --- Polling ---
  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    refreshStatus();
    pollTimer = setInterval(refreshStatus, 10000);
  }

  // --- Init ---
  if (hasCreds()) {
    startPolling();
    loadConfig();
  }

  // Restart polling when page becomes visible again
  document.addEventListener("visibilitychange", function() {
    if (!document.hidden && hasCreds()) {
      startPolling();
      loadConfig();
    }
  });
})();
</script>
</body>
</html>
